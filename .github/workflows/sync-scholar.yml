name: Sync Google Scholar Publications

on:
  schedule:
    # Every 6 months: January 1st and July 1st at 06:00 UTC
    - cron: "0 6 1 1,7 *"
  workflow_dispatch:
    # Allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the generated files
      actions: write    # needed to trigger the deploy workflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync publications from Google Scholar
        run: python scripts/sync_scholar.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/scholar-publications/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: sync publications from Google Scholar"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
