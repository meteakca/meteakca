<script>
  // Redirect "See all" button in Journal Articles section to scholar publications page
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('a').forEach(function (a) {
      var text = a.textContent.trim().toLowerCase();
      if ((text.includes('see all') || text.includes('view all')) && text.includes('publication')) {
        a.href = 'https://www.meteakcaoglu.com/scholar-publications/';
      }
    });
  });
</script>
