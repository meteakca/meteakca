{{ define "main" }}
<div class="universal-wrapper pt-3 container-fluid">

  <h1 class="pub-title">{{ .Title }}</h1>

  <div style="margin-bottom: 1rem;">
    <a href="https://drive.google.com/file/d/1FaaibrxHUTPRPjpKxdV-VXhxa-zwEXUw/view?usp=drive_link"
       class="btn btn-outline-primary btn-sm"
       target="_blank" rel="noopener">
      Download / Open in Drive
    </a>
  </div>

  <div style="position: relative; width: 100%; padding-bottom: 0; height: 85vh;">
    <iframe
      src="https://drive.google.com/file/d/1FaaibrxHUTPRPjpKxdV-VXhxa-zwEXUw/preview"
      style="width: 100%; height: 100%; border: none;"
      allow="autoplay"
      loading="lazy">
    </iframe>
  </div>

</div>
{{ end }}
